<VirtualHost *:80>
	ServerName api.quickfix.test
	DocumentRoot "/var/www/html/api/web"

	<Directory "/var/www/html/api/web/">
		RewriteEngine on
		AllowOverride All

		RewriteCond %{REQUEST_FILENAME} !-f
		RewriteCond %{REQUEST_FILENAME} !-d
		RewriteRule . index.php

		DirectoryIndex index.php
		Require all granted
	</Directory>
</VirtualHost>