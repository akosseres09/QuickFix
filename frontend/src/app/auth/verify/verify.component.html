<div class="max-w-md p-5 xs:p-8 space-y-6 sm:m-4 bg-white rounded-xl shadow-lg dark:bg-slate-800">
    <div class="text-center">
        <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Verify Account</h1>
        <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">
            We have sent an email to your email address. Please paste the verifying token in the
            input below to continue
        </p>
    </div>

    <form class="space-y-4" [formGroup]="verifyForm" (ngSubmit)="onSubmit()">
        <mat-form-field class="w-full" color="accent" appearance="outline">
            <mat-label>Token</mat-label>
            <mat-icon matPrefix class="!text-light-text dark:!text-inherit">token</mat-icon>
            <input
                formControlName="token"
                matInput
                type="text"
                autocomplete="current-password"
                required
            />
            <mat-icon class="cursor-pointer !text-light-text dark:!text-inherit" matSuffix
                >lock</mat-icon
            >
            <mat-error class="text-sm" *ngIf="getControl('token')?.invalid">
                <span *ngIf="getControl('token')?.hasError('required')">Token is required.</span>
            </mat-error>
        </mat-form-field>

        <div>
            <button
                type="submit"
                mat-raised-button
                color="primary"
                class="w-full !py-3 !transition-colors !duration-300 !text-dark-text !bg-light-primary"
            >
                Verify Account
            </button>
        </div>
    </form>

    <div class="text-center text-sm flex flex-col gap-2">
        <div class="text-sm">
            Have not received the email?
            <a
                routerLink="/auth/resend-verification"
                class="cursor-pointer font-medium text-light-accent dark:text-dark-primary hover:text-light-accent-hover dark:hover:text-dark-primary-hover"
            >
                Resend Email
            </a>
        </div>
    </div>
</div>
