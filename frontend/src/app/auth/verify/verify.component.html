<!-- Login Card -->
<div
    class="w-full max-w-md p-8 space-y-6 bg-white rounded-xl shadow-lg dark:bg-slate-800 m-4"
>
    <!-- Header -->
    <div class="text-center">
        <h1 class="text-3xl font-bold text-slate-900 dark:text-white">
            Verify Account
        </h1>
        <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">
            We have sent an email to the previously given email address. Please paste the verifying token in the input below to continue.
        </p>
    </div>

    <form class="space-y-4" [formGroup]="verifyForm" (ngSubmit)="onSubmit()">
        <mat-form-field class="w-full" color="accent" appearance="outline">
            <mat-label>Token</mat-label>
            <mat-icon matPrefix class="!text-light-text dark:!text-inherit"
            >lock</mat-icon
            >
            <input
                formControlName="token"
                matInput
                type="text"
                autocomplete="current-password"
                required
            />
            <mat-icon
                class="cursor-pointer !text-light-text dark:!text-inherit"
                matSuffix
            >lock</mat-icon
            >
            <mat-error
                *ngIf="
                    getControl('token')?.invalid &&
                    getControl('token')?.touched
                "
            >
                <span *ngIf="getControl('token')?.hasError('required')"
                >Token is required.</span
                >

            </mat-error>
        </mat-form-field>

        <div>
            <button
                type="submit"
                mat-raised-button
                color="primary"
                class="w-full !py-3 !transition-colors !duration-300 !text-dark-text !bg-light-primary"
            >
                Verify Account
            </button>
        </div>
    </form>

</div>
