<nav
    class="px-4 py-3 text-xl font-bold border-b-2 bg-light-background dark:bg-dark-background border-light-text-hover dark:border-dark-hover"
>
    <div class="max-w-screen-2xl relative md:flex md:items-center" [class.mx-auto]="!user">
        <div class="mr-auto flex items-center justify-between gap-12">
            <a href="/" class="flex items-center space-x-2">
                <img [src]="imageSource" width="48" />
                <span>QuickFix</span>
            </a>
            <button
                *ngIf="showSidebarToggle()"
                (click)="toggleSidebar()"
                class="hidden md:block p-2 rounded cursor-pointer hover:bg-light-text-hover dark:hover:bg-dark-hover transition-[background-color]"
                [attr.aria-label]="isSidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
            >
                <svg
                    class="w-5 h-5 transition-transform"
                    [class.rotate-180]="isSidebarCollapsed"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M11 19l-7-7 7-7m8 14l-7-7 7-7"
                    />
                </svg>
            </button>
            <button
                class="md:hidden inline-flex items-center p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg cursor-pointer"
                (click)="toggleMenu()"
                aria-label="Toggle menu"
            >
                <svg
                    class="w-6 h-6"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M4 6h16M4 12h16M4 18h16"
                    ></path>
                </svg>
            </button>
        </div>

        <div
            class="overflow-hidden transition-[background-color] duration-200 ease-in-out md:max-h-full md:opacity-100 md:mt-0 md:block"
            [ngClass]="{
                'max-h-0 opacity-0': !isMenuOpen,
                'max-h-screen opacity-100 mt-4': isMenuOpen,
            }"
        >
            <ul
                class="flex flex-col space-y-2 md:space-y-0 md:space-x-3 md:flex-row md:justify-end text-base md:items-center md:mt-2"
            >
                @for (route of routes; track $index) {
                    <li>
                        <a
                            *ngIf="route.type === 'button'"
                            routerLink="{{ route.path }}"
                            routerLinkActive="dark:bg-dark-hover bg-light-text-hover"
                            [routerLinkActiveOptions]="{ exact: route.exact ?? false }"
                            class="block py-2 px-3 border border-transparent rounded-xl dark:hover:bg-dark-hover hover:bg-light-text-hover duration-200"
                            >{{ route.name }}</a
                        >
                        <button
                            *ngIf="route.type === 'menu'"
                            class="p-2 rounded-2xl flex items-center justify-center cursor-pointer dark:hover:bg-dark-hover hover:bg-light-text-hover transition-[background-color] duration-200"
                            matButton
                            [matMenuTriggerFor]="menu"
                        >
                            @if (route.icon) {
                                <mat-icon> {{ route.icon }} </mat-icon>
                            } @else {
                                <span>{{ route.name }}</span>
                            }
                            <mat-icon> keyboard_arrow_down </mat-icon>
                        </button>
                        <mat-menu class="" #menu="matMenu">
                            @for (children of route.children; track $index) {
                                <a
                                    mat-menu-item
                                    [routerLink]="children.path"
                                    routerLinkActive="dark:!bg-dark-accent/20 !bg-light-background/60"
                                    [routerLinkActiveOptions]="{ exact: true }"
                                >
                                    <mat-icon>
                                        {{ children.icon }}
                                    </mat-icon>
                                    <span>{{ children.name }}</span>
                                </a>
                            }
                        </mat-menu>
                    </li>
                }

                <li class="hidden md:flex items-center justify-start">
                    <button
                        class="p-2 rounded-2xl flex items-center justify-center cursor-pointer dark:hover:bg-dark-hover hover:bg-light-text-hover transition-[background-color] duration-200"
                        matButton
                        [matMenuTriggerFor]="menu"
                    >
                        @if (theme === 'light') {
                            <mat-icon> sunny </mat-icon>
                        } @else {
                            <mat-icon> bedtime </mat-icon>
                        }
                    </button>
                    <mat-menu class="" #menu="matMenu">
                        <button
                            [ngClass]="theme === 'light' ? '!bg-light-background/60' : ''"
                            mat-menu-item
                            (click)="setTheme('light')"
                        >
                            <mat-icon> sunny </mat-icon>
                            <span>Light</span>
                        </button>
                        <button
                            [ngClass]="theme === 'dark' ? '!bg-dark-accent/20' : ''"
                            mat-menu-item
                            (click)="setTheme('dark')"
                        >
                            <mat-icon> bedtime </mat-icon>
                            <span>Dark</span>
                        </button>
                    </mat-menu>
                </li>
                <li class="flex md:hidden items-center justify-start gap-4 px-3 py-2">
                    <mat-button-toggle-group
                        name="theme"
                        [(value)]="theme"
                        (change)="onToggle($event)"
                        aria-label="Change theme"
                    >
                        <mat-button-toggle value="light">
                            <div
                                class="text-amber-400 dark:text-yellow-400 flex items-center justify-items-center h-lh"
                            >
                                <mat-icon>sunny</mat-icon>
                            </div>
                        </mat-button-toggle>
                        <mat-button-toggle value="dark">
                            <div
                                class="text-light-text dark:text-inherit flex items-center justify-items-center h-lh"
                            >
                                <mat-icon>bedtime</mat-icon>
                            </div>
                        </mat-button-toggle>
                    </mat-button-toggle-group>
                </li>
            </ul>
        </div>
    </div>
</nav>
