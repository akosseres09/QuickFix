@for (route of routes; track $index) {
    @if (route.children && route.children.length > 0) {
        <mat-expansion-panel class="w-full" *ngIf="!isCollapsed">
            <mat-expansion-panel-header
                class="hover:!bg-light-text-hover dark:hover:!bg-dark-hover !transition-[background-color] !duration-100"
            >
                <mat-panel-title class="flex gap-2">
                    <mat-icon matPrefix *ngIf="route.icon">
                        {{ route.icon }}
                    </mat-icon>
                    {{ route.name }}
                </mat-panel-title>
            </mat-expansion-panel-header>
            @for (child of route.children; track $index) {
                <a
                    class="flex items-center gap-3 w-full ms-2 px-3 py-2 rounded-sm hover:bg-light-text-hover dark:hover:bg-dark-hover transition-[background-color] duration-100"
                    [class.my-2]="!$last"
                    [routerLink]="child.path"
                    routerLinkActive="bg-light-hover dark:bg-dark-hover"
                    [routerLinkActiveOptions]="{ exact: true }"
                >
                    <mat-icon *ngIf="child.icon"> {{ child.icon }} </mat-icon>
                    {{ child.name }}
                </a>
            }
        </mat-expansion-panel>
    } @else {
        <a
            [routerLink]="route.path"
            class="flex items-center gap-2 w-full h-[50px] rounded-sm px-6 py-2 hover:bg-light-text-hover dark:hover:bg-dark-hover transition-[background-color] duration-100"
            routerLinkActive="bg-light-hover dark:bg-dark-hover"
            [routerLinkActiveOptions]="{ exact: true }"
            *ngIf="!isCollapsed"
        >
            <mat-icon *ngIf="route.icon">
                {{ route.icon }}
            </mat-icon>
            <span class="truncate">{{ route.name }}</span>
        </a>
    }

    <a
        [routerLink]="route.path"
        class="px-3 py-2 w-full rounded-2xl flex flex-col gap-2 justify-center items-center hover:bg-light-text-hover dark:hover:bg-dark-hover"
        routerLinkActive="bg-light-text-hover dark:bg-dark-hover"
        *ngIf="isCollapsed"
    >
        <mat-icon>
            {{ route.icon }}
        </mat-icon>
        <span class="text-[0.625rem] truncate">{{ route.name }}</span>
    </a>
}
