<nav
    class="flex flex-col h-full transition-[width] duration-200"
    [class.w-20]="isCollapsed"
    [class.w-[250px]]="!isCollapsed"
>
    <div class="flex-1 overflow-y-auto py-4">
        <ng-container *ngFor="let route of routes">
            <div *ngIf="route.type === 'menu'" class="mb-1">
                <button
                    (click)="toggleMenu(route.name)"
                    class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                    [class.bg-gray-100]="isMenuOpen(route.name)"
                    [class.dark:bg-gray-800]="isMenuOpen(route.name)"
                >
                    <div class="flex items-center gap-3">
                        <span *ngIf="route.icon" class="text-xl">{{ route.icon }}</span>
                        <svg
                            *ngIf="!route.icon"
                            class="w-5 h-5"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16"
                            />
                        </svg>
                        <span *ngIf="!isCollapsed" class="font-medium">{{ route.name }}</span>
                    </div>
                    <svg
                        *ngIf="!isCollapsed"
                        class="w-4 h-4 transition-transform"
                        [class.rotate-180]="isMenuOpen(route.name)"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M19 9l-7 7-7-7"
                        />
                    </svg>
                </button>

                <div
                    *ngIf="isMenuOpen(route.name) && !isCollapsed"
                    class="bg-gray-50 dark:bg-gray-900"
                >
                    <ng-container *ngFor="let child of route.children">
                        <a
                            *ngIf="child.type === 'button'"
                            [routerLink]="child.path"
                            routerLinkActive="bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-400"
                            class="flex items-center gap-3 px-4 py-2 pl-12 hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors"
                        >
                            <span *ngIf="child.icon" class="text-lg">{{ child.icon }}</span>
                            <span class="text-sm">{{ child.name }}</span>
                        </a>
                    </ng-container>
                </div>
            </div>

            <a
                *ngIf="route.type === 'button'"
                [routerLink]="route.path"
                routerLinkActive="bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-400"
                class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                [title]="isCollapsed ? route.name : ''"
            >
                <span *ngIf="route.icon" class="text-xl">{{ route.icon }}</span>
                <svg
                    *ngIf="!route.icon"
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"
                    />
                </svg>
                <span *ngIf="!isCollapsed" class="font-medium">{{ route.name }}</span>
            </a>
        </ng-container>
    </div>
</nav>
