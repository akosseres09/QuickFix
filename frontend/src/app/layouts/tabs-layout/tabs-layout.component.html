<nav mat-tab-nav-bar [tabPanel]="tabPanel">
    @for (tab of tabs(); track $index) {
        <a
            mat-tab-link
            [routerLink]="tab.route"
            routerLinkActive
            [routerLinkActiveOptions]="{ exact: true }"
            #rla="routerLinkActive"
            [active]="rla.isActive"
        >
            {{ tab.label }}
        </a>
    }
</nav>

<section class="mt-6">
    <router-outlet></router-outlet>
</section>
