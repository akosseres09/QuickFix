<nav
    mat-tab-nav-bar
    [mat-stretch-tabs]="false"
    [tabPanel]="tabPanel"
    class="border-b border-gray-700"
>
    @for (tab of tabs(); track $index) {
        @let shown = showTab(tab);
        @if (shown) {
            <a
                mat-tab-link
                [routerLink]="tab.route"
                routerLinkActive
                [routerLinkActiveOptions]="{
                    paths: 'exact',
                    queryParams: 'ignored',
                    matrixParams: 'ignored',
                    fragment: 'ignored',
                }"
                #rla="routerLinkActive"
                [active]="rla.isActive"
                class="w-[12.5rem]"
            >
                {{ tab.label }}
            </a>
        }
    }
</nav>

<section class="mt-6 flex-1 flex flex-col overflow-hidden">
    <router-outlet></router-outlet>
</section>
