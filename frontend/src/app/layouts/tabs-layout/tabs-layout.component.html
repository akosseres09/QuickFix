<nav mat-tab-nav-bar [tabPanel]="tabPanel">
    <a
        mat-tab-link
        *ngFor="let tab of tabs"
        [routerLink]="tab.route"
        routerLinkActive
        [routerLinkActiveOptions]="{ exact: true }"
        #rla="routerLinkActive"
        [active]="rla.isActive"
    >
        {{ tab.label }}
    </a>
</nav>

<section class="mt-6">
    <router-outlet></router-outlet>
</section>
