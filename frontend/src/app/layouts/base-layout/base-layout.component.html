<main class="flex flex-col h-full">
    <app-navbar [showSidebarToggle]="false"></app-navbar>
    <div
        class="mt-10"
        [ngClass]="
            innerPage()
                ? 'h-full max-w-7xl mx-auto w-full px-6 xl:px-0 pb-8'
                : 'flex justify-center flex-1'
        "
    >
        <router-outlet></router-outlet>
    </div>
    @if (!innerPage()) {
        <app-footer></app-footer>
    }
</main>
