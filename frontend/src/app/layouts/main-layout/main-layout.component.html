<main class="h-screen w-full overflow-hidden">
    <mat-sidenav-container class="!h-full">
        <mat-sidenav
            #sidenav
            [mode]="sidebarMode()"
            [opened]="isSidebarOpened()"
            (openedChange)="onSidebarOpenedChange($event)"
            [disableClose]="sidebarMode() === 'side' ? true : false"
            position="start"
            class="!w-56 lg:!w-64 px-2 py-4 overflow-hidden"
        >
            <div class="flex flex-col h-full overflow-hidden">
                <div class="ps-1 mb-7">
                    <a href="/" class="flex items-center gap-4">
                        <img [src]="imageSource()" width="48" />
                        <span class="text-xl font-semibold">QuickFix</span>
                    </a>
                </div>
                <div class="flex-5/6 overflow-auto">
                    <app-navitem [routes]="sidenavRoutes()"></app-navitem>
                </div>
                <div class="flex items-end">
                    <app-navitem [routes]="bottomSidenavRoutes()"></app-navitem>
                </div>
            </div>
        </mat-sidenav>
        <mat-sidenav-content>
            <app-navbar
                [showMenuLogo]="false"
                [isSidebarOpened]="isSidebarOpened()"
                (isSidebarOpenedChange)="onSidebarOpenedChange($event)"
                (imageSourceChange)="imageSource.set($event)"
                class="row-span-1 col-span-2"
            ></app-navbar>
            <section class="flex-1 p-4 flex flex-col">
                <router-outlet></router-outlet>
            </section>
        </mat-sidenav-content>
    </mat-sidenav-container>
</main>
