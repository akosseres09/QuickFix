<div class="mx-auto p-4 sm:p-6">
    <div class="max-w-7xl mx-auto">
        <div class="mb-6 flex items-center justify-between">
            <h1
                class="flex gap-3 items-center text-2xl font-semibold text-slate-900 dark:text-white"
            >
                <a
                    routerLink="/projects"
                    class="md:hidden cursor-pointer flex items-center justify-center p-1 rounded-full dark:hover:bg-dark-background-hover hover:bg-light-text-hover transition-colors duration-200"
                >
                    <mat-icon>arrow_back</mat-icon>
                </a>
                Create Organization
            </h1>
        </div>

        @if (organiation()) {
            <app-organization-form
                [organization]="organiation()"
                buttonText="Edit Organization"
                icon="edit"
                (formSubmitted)="editOrganization($event)"
            >
            </app-organization-form>
        } @else {
            <mat-spinner diameter="45"></mat-spinner>
        }
    </div>
</div>
