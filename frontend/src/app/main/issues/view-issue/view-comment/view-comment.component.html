<div class="space-y-8">
    @for (comment of comments(); track comment.id) {
        <div
            [ngClass]="{
                'before:content-[\'\'] before:bg-gray-700 before:absolute before:block before:h-8 before:w-[1px] before:top-[-2rem] before:left-20':
                    !$first,
            }"
            class="relative flex gap-4 comment"
        >
            <app-avatar [user]="comment.creator!"></app-avatar>
            <div class="w-full border border-gray-700 rounded-md">
                <div class="w-full px-4 py-2 border-b border-gray-700">
                    <a
                        class="hover:underline hover:underline-offset-2"
                        [routerLink]="['/users', '@' + comment.creator?.username]"
                        >{{ comment.creator?.username }}</a
                    >
                    <span
                        class="text-gray-400"
                        matTooltipShowDelay="500"
                        [matTooltip]="comment.createdAt | gmt"
                    >
                        {{ comment.createdAt * 1000 | relativeTime }}
                    </span>
                </div>
                <div class="p-4">
                    <quill-view
                        class="!w-full border-red-500"
                        format="json"
                        [content]="comment.content"
                    ></quill-view>
                </div>
            </div>
        </div>
    }
</div>
