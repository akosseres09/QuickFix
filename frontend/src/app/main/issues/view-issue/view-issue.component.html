@if (issue(); as issue) {
    <app-view
        [issueId]="issueId()"
        [projectId]="projectId()"
        [organizationId]="organizationId()"
        [issue]="issue"
    ></app-view>
} @else if (loading()) {
    <div class="flex items-center justify-center py-20">
        <mat-icon class="animate-spin text-4xl text-gray-400">autorenew</mat-icon>
    </div>
} @else {
    <div class="flex flex-col items-center justify-center py-20 text-center">
        <mat-icon class="text-6xl text-gray-300 dark:text-gray-600 mb-4">search_off</mat-icon>
        <h2 class="text-xl font-semibold text-gray-700 dark:text-gray-300 mb-2">Issue not found</h2>
        <p class="text-gray-500 dark:text-gray-400">
            The issue you're looking for doesn't exist or has been deleted.
        </p>
    </div>
}
