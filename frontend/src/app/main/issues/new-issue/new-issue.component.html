<div class="mx-auto p-4 sm:p-6">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="mb-6">
            <h1 class="text-2xl font-semibold text-slate-900 dark:text-white">New Issue</h1>
        </div>

        <app-issue-form
            [organizationId]="organizationId()"
            [projectId]="projectId()"
            (formSubmitted)="onIssueCreated($event)"
            (isSubmittingChange)="isSubmitting.set($event)"
            [isSubmitting]="isSubmitting()"
        ></app-issue-form>
    </div>
</div>
