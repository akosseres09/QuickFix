<div class="h-full flex flex-col px-4">
    @if (isLoading()) {
        <div class="flex justify-center items-center h-64">
            <div class="text-gray-500">Loading issues...</div>
        </div>
    } @else {
        <div class="flex-1 flex flex-col" cdkDropListGroup>
            <div class="flex flex-1 gap-4 overflow-x-auto pb-4">
                @for (column of columns(); track column.label.id) {
                    <app-board-column
                        [organizationId]="organizationId()"
                        [columnTitle]="column.label.name"
                        [issues]="column.issues"
                        [labelId]="column.label.id"
                        (dropEvent)="onDrop($event, column.label.id)"
                        (issueClick)="onIssueClick($event)"
                    ></app-board-column>
                }
            </div>
        </div>
    }
</div>
