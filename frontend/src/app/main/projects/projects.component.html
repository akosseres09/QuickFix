<div class="min-h-full">
    <!-- <app-project-filter (onFilterChange)="onFilterChange($event)"></app-project-filter> -->
    <app-filter
        [filterFields]="filterFields"
        (onFilterChange)="onFilterChange($event)"
    ></app-filter>
    <app-table
        [dataSource]="shownProjects()"
        [displayedColumns]="displayedColumns()"
        tableHeader="Projects"
        [initialPageSize]="pageSize()"
        [initialPageIndex]="pageIndex()"
        [initialSortActive]="sortActive()"
        [initialSortDirection]="sortDirection()"
        [totalCount]="totalCount()"
        [isLoading]="isLoading()"
        (sortChange)="onSortChange($event)"
        (pageChange)="onPageChange($event)"
        (selectedRowChange)="onRowChange($event)"
    ></app-table>
    <div class="fixed right-6 bottom-6 z-50">
        <app-speed-dial
            #speedDial
            (togglerClick)="createProject()"
            [buttons]="speedDialButtons()"
        ></app-speed-dial>
    </div>
</div>
