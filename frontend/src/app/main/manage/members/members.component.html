<div class="max-w-7xl mx-auto">
    <div class="flex flex-col sm:flex-row gap-2 sm:gap-0 justify-between mb-8">
        <div>
            <h3 class="font-bold text-3xl text-light-text dark:text-dark-text mb-2">
                Members of this project
            </h3>
            <p class="text-light-text/60 dark:text-dark-text/60">
                Manage team members and their roles
            </p>
        </div>
        @if (canInvite()) {
            <button mat-flat-button color="primary" class="!text-white">
                <mat-icon class="block md:hidden">add</mat-icon>
                <span class="block">Invite Members</span>
            </button>
        }
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        @for (item of members(); track item.id) {
            <app-member-card
                [organizationId]="organizationId()"
                [member]="item"
                [currentUser]="currentUser()"
                [RoleLabels]="roleLabels"
                [getRoleBadgeClass]="getRoleBadgeClass"
            ></app-member-card>
        } @empty {
            <div
                class="col-span-full flex flex-col items-center justify-center py-16 text-light-text/60 dark:text-dark-text/60"
            >
                <svg
                    class="w-16 h-16 mb-4 opacity-50"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="1.5"
                        d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"
                    />
                </svg>
                <p class="text-lg font-medium">No members found</p>
                <p class="text-sm">Add members to start collaborating</p>
            </div>
        }
        @if (hasMore()) {
            <div class="col-span-full flex justify-center">
                <button
                    mat-stroked-button
                    color="primary"
                    (click)="loadMore()"
                    [disabled]="isLoading()"
                >
                    <mat-icon class="mr-2">refresh</mat-icon>
                    Load More
                </button>
            </div>
        }
    </div>
</div>
