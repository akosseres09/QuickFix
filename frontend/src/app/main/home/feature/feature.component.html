<section class="px-6 py-20 lg:py-28">
    <div class="container mx-auto max-w-7xl">
        <div class="text-center mb-16" [@scrollAnimation]="animationState()" @scaleUp>
            <h2 class="text-4xl lg:text-6xl font-black text-gray-900 dark:text-white mb-4">
                Everything You Need
            </h2>
            <p class="text-xl text-gray-600 dark:text-gray-400 max-w-2xl mx-auto">
                Powerful features to help your team collaborate and deliver better results
            </p>
        </div>

        <div
            [@scrollAnimation]="animationState()"
            [@staggerAnimation]="features.length"
            class="grid md:grid-cols-2 lg:grid-cols-4 gap-6"
        >
            <div
                *ngFor="let feature of features"
                class="group relative p-8 bg-white dark:bg-gray-800 rounded-2xl shadow-lg hover:shadow-2xl border border-gray-200 dark:border-gray-700 transition-all duration-500 hover:-translate-y-2"
            >
                <div
                    class="absolute inset-0 bg-gradient-to-br opacity-0 group-hover:opacity-5 rounded-2xl transition-opacity duration-500"
                    [ngClass]="{
                        'from-blue-500 to-cyan-500': feature.color === 'blue',
                        'from-purple-500 to-pink-500': feature.color === 'purple',
                        'from-green-500 to-emerald-500': feature.color === 'green',
                        'from-orange-500 to-red-500': feature.color === 'orange',
                    }"
                ></div>

                <div class="relative z-10">
                    <div
                        class="text-6xl mb-6 transform group-hover:scale-110 group-hover:-rotate-6 transition-all duration-500"
                    >
                        {{ feature.icon }}
                    </div>
                    <h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-3">
                        {{ feature.title }}
                    </h3>
                    <p class="text-gray-600 dark:text-gray-400 leading-relaxed">
                        {{ feature.description }}
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
