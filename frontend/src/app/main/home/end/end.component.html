<section [@scrollAnimation]="animationState" @fadeInRight class="px-6 py-20 lg:py-28">
    <div class="container mx-auto max-w-5xl">
        <div
            class="relative bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-600 rounded-3xl p-12 lg:p-16 shadow-2xl overflow-hidden"
        >
            <div
                class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-white/10 via-transparent to-transparent"
            ></div>

            <div class="relative z-10 text-center">
                <h2 class="text-4xl lg:text-6xl font-black text-white mb-6">
                    Ready to Get Started?
                </h2>
                <p class="text-xl text-blue-100 mb-10 max-w-2xl mx-auto leading-relaxed">
                    Join thousands of teams using QuickFix to build better products and ship faster
                    than ever before.
                </p>
                <a
                    routerLink="/auth/signup"
                    class="inline-flex items-center gap-2 px-10 py-5 bg-white text-blue-600 font-bold text-lg rounded-xl shadow-xl hover:shadow-2xl transform hover:-translate-y-1 hover:scale-105 transition-all duration-300"
                >
                    <span>Start Free Trial</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M13 7l5 5m0 0l-5 5m5-5H6"
                        ></path>
                    </svg>
                </a>
                <p class="text-blue-100 text-sm mt-6">
                    No credit card required • Cancel anytime • Free for 14 days
                </p>
            </div>
        </div>
    </div>
</section>
