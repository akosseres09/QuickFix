<section
    [@scrollAnimation]="animationState()"
    @fadeInLeft
    class="px-6 py-20 bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm"
>
    <div class="container mx-auto max-w-7xl">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-8 lg:gap-16">
            <div class="text-center group cursor-default">
                <div
                    class="text-5xl lg:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 dark:from-blue-400 dark:to-cyan-400 mb-2 transform group-hover:scale-110 transition-transform duration-300"
                >
                    20K+
                </div>
                <p
                    class="text-sm lg:text-base font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider"
                >
                    Active Users
                </p>
            </div>
            <div class="text-center group cursor-default">
                <div
                    class="text-5xl lg:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600 dark:from-purple-400 dark:to-pink-400 mb-2 transform group-hover:scale-110 transition-transform duration-300"
                >
                    100K+
                </div>
                <p
                    class="text-sm lg:text-base font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider"
                >
                    Issues Tracked
                </p>
            </div>
            <div class="text-center group cursor-default">
                <div
                    class="text-5xl lg:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-600 to-emerald-600 dark:from-green-400 dark:to-emerald-400 mb-2 transform group-hover:scale-110 transition-transform duration-300"
                >
                    99.9%
                </div>
                <p
                    class="text-sm lg:text-base font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider"
                >
                    Uptime
                </p>
            </div>
            <div class="text-center group cursor-default">
                <div
                    class="text-5xl lg:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-red-600 dark:from-orange-400 dark:to-red-400 mb-2 transform group-hover:scale-110 transition-transform duration-300"
                >
                    24/7
                </div>
                <p
                    class="text-sm lg:text-base font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider"
                >
                    Support
                </p>
            </div>
        </div>
    </div>
</section>
